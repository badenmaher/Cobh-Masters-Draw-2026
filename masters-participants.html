<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Participants &mdash; Masters 2026 Cobh Golf Club Sweep</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Work+Sans:wght@300..700&display=swap" rel="stylesheet">
<style>
:root{
  --green:#0f5132;--green-mid:#1a6b45;--green-deep:#0a3320;--gold:#d4af37;--gold-lt:#f0d060;--cream:#f5f0e8;
  --text-on-dark:#e8e4dc;--text-muted:#8ea89a;
  --text-xs:clamp(.75rem,.7rem + .25vw,.875rem);--text-sm:clamp(.875rem,.8rem + .35vw,1rem);
  --text-base:clamp(1rem,.95rem + .25vw,1.125rem);--text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);
  --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
  --font-display:'Playfair Display',Georgia,serif;--font-body:'Work Sans','Helvetica Neue',sans-serif;
  --sp1:.25rem;--sp2:.5rem;--sp3:.75rem;--sp4:1rem;--sp5:1.25rem;--sp6:1.5rem;--sp8:2rem;--sp12:3rem;--sp16:4rem;
  --r-sm:.375rem;--r-md:.5rem;--r-lg:.75rem;--r-xl:1rem;--r-full:9999px;
  --shadow-card:0 2px 8px rgba(0,0,0,.5),0 8px 24px rgba(0,0,0,.4);--t:180ms cubic-bezier(.16,1,.3,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{font-family:var(--font-body);font-size:var(--text-base);background:#071a0f;color:var(--text-on-dark);min-height:100dvh;line-height:1.6}
button{cursor:pointer;font:inherit;border:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}
header{background:linear-gradient(160deg,var(--green-deep) 0,var(--green) 60%,#1a5c30 100%);border-bottom:2px solid var(--gold);padding:var(--sp6) var(--sp4);}
.header-inner{max-width:1100px;margin-inline:auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:var(--sp4)}
.page-title{font-family:var(--font-display);font-size:var(--text-xl);color:var(--gold-lt)}
.page-sub{font-size:var(--text-sm);color:var(--text-muted);margin-top:var(--sp1)}
.back-btn{display:inline-flex;align-items:center;gap:var(--sp2);padding:var(--sp2) var(--sp5);border-radius:var(--r-full);border:1.5px solid var(--gold);color:var(--gold);font-size:var(--text-sm);font-weight:600;transition:all var(--t)}
.back-btn:hover{background:rgba(212,175,55,.12)}
.controls{max-width:1100px;margin-inline:auto;padding:var(--sp4) var(--sp4) 0;display:flex;gap:var(--sp3);flex-wrap:wrap;align-items:center}
#search-part{padding:var(--sp2) var(--sp5);border-radius:var(--r-full);background:rgba(255,255,255,.06);color:var(--text-on-dark);font-size:var(--text-sm);border:1px solid rgba(255,255,255,.12);width:260px;outline:none;transition:border-color var(--t)}
#search-part:focus{border-color:var(--gold)}
#search-part::placeholder{color:var(--text-muted)}
.count-badge{font-size:var(--text-xs);color:var(--text-muted);margin-left:auto}
.participants-grid{max-width:1100px;margin-inline:auto;padding:var(--sp6) var(--sp4) var(--sp12);display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:var(--sp4)}
.p-card{background:var(--green-deep);border:1px solid rgba(212,175,55,.15);border-radius:var(--r-lg);padding:var(--sp5);box-shadow:var(--shadow-card);transition:border-color var(--t)}
.p-card:hover{border-color:rgba(212,175,55,.4)}
.p-name{font-weight:700;font-size:var(--text-base);color:var(--cream);margin-bottom:var(--sp3);display:flex;justify-content:space-between;align-items:center}
.p-num{font-size:var(--text-xs);color:var(--text-muted);font-weight:400}
.bracket-section{margin-bottom:var(--sp3)}
.b-label{font-size:var(--text-xs);color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:var(--sp1)}
.b-players{display:flex;gap:var(--sp1);flex-wrap:wrap}
.pick-tag{display:inline-block;padding:2px var(--sp2);border-radius:var(--r-sm);font-size:.72rem;white-space:nowrap}
.pick-b1{background:rgba(37,99,168,.3);color:#7eb8f5}.pick-b2{background:rgba(212,175,55,.25);color:#e8d070}
.pick-b3{background:rgba(93,184,122,.2);color:#90d898}.pick-b4{background:rgba(205,127,50,.25);color:#e0ab72}
.no-picks{color:var(--text-muted);font-size:var(--text-xs);font-style:italic}
.msg{max-width:1100px;margin:var(--sp12) auto;padding:var(--sp4);text-align:center;color:var(--text-muted)}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.skeleton{background:linear-gradient(90deg,var(--green-deep) 25%,#0f3d20 50%,var(--green-deep) 75%);background-size:200% 100%;animation:shimmer 1.5s ease-in-out infinite;border-radius:var(--r-sm);height:14px}
footer{background:var(--green-deep);border-top:1px solid rgba(212,175,55,.15);padding:var(--sp4);text-align:center;font-size:var(--text-xs);color:var(--text-muted)}
@media(max-width:600px){.participants-grid{grid-template-columns:1fr}#search-part{width:100%}.controls{flex-direction:column;align-items:stretch}.count-badge{margin-left:0}}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div>
      <div class="page-title">Masters 2026 &mdash; All Participants</div>
      <div class="page-sub">Cobh Golf Club Sweep &bull; Augusta National &bull; Apr 9&ndash;12</div>
    </div>
    <a href="index.html" class="back-btn">&larr; Back to Leaderboard</a>
  </div>
</header>
<div class="controls">
  <input id="search-part" type="search" placeholder="Search name or player&hellip;" aria-label="Search participants">
  <span class="count-badge" id="count-badge">Loading&hellip;</span>
</div>
<div class="participants-grid" id="participants-grid">
  <div class="p-card"><div class="skeleton" style="width:60%;margin-bottom:12px"></div><div class="skeleton" style="width:80%;margin-bottom:8px"></div><div class="skeleton" style="width:70%"></div></div>
  <div class="p-card"><div class="skeleton" style="width:55%;margin-bottom:12px"></div><div class="skeleton" style="width:75%;margin-bottom:8px"></div><div class="skeleton" style="width:65%"></div></div>
  <div class="p-card"><div class="skeleton" style="width:70%;margin-bottom:12px"></div><div class="skeleton" style="width:85%;margin-bottom:8px"></div><div class="skeleton" style="width:60%"></div></div>
</div>
<footer>Cobh Golf Club Sweep &bull; Masters 2026 &bull; Auto-refreshes every 5 minutes</footer>
<script>
var PROXY='https://corsproxy.io/?';
var CSV='https://docs.google.com/spreadsheets/d/e/2PACX-1vTcK-7L1HPPhCjzjORjaxQ9DUEznolHMbCkG1e-cEXZ2v2xx_qw7DygtkfdNjO9GiSsyd5KaQaS8RU9/pub?gid=1462564797&single=true&output=csv';
var allP=[];
function parseCSV(text){var lines=text.trim().split('\n');if(lines.length<2)return[];var h=sl(lines[0]);var r=[];for(var i=1;i<lines.length;i++){if(!lines[i].trim())continue;var v=sl(lines[i]);var row={};for(var j=0;j<h.length;j++)row[h[j]]=(v[j]||'').trim();r.push(row);}return r;}
function sl(line){var r=[],c='',q=false;for(var i=0;i<line.length;i++){var ch=line[i];if(ch==='"'){q=!q;}else if(ch===','&&!q){r.push(c.trim());c='';}else{c+=ch;}}r.push(c.trim());return r;}
function loadParticipants(){
  fetch(PROXY+encodeURIComponent(CSV)+'&t='+Date.now())
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.text();})
    .then(function(csv){
      var rows=parseCSV(csv);
      allP=rows.map(function(r){return{name:r['Name']||r['EntrantName']||'',b1p1:r['B1Pick1']||'',b1p2:r['B1Pick2']||'',b2p1:r['B2Pick1']||'',b2p2:r['B2Pick2']||'',b3p1:r['B3Pick1']||'',b3p2:r['B3Pick2']||'',b4p1:r['B4Pick1']||'',b4p2:r['B4Pick2']||''};}).filter(function(p){return p.name.length>0;});
      document.getElementById('count-badge').textContent=allP.length+' participants';
      renderGrid('');
    })
    .catch(function(e){document.getElementById('participants-grid').innerHTML='<div class="msg">Could not load participants.<br><small>'+e.message+'</small></div>';document.getElementById('count-badge').textContent='Error';});
}
function renderGrid(q){
  var filtered=allP.filter(function(p){if(!q)return true;var ql=q.toLowerCase();return p.name.toLowerCase().indexOf(ql)!==-1||[p.b1p1,p.b1p2,p.b2p1,p.b2p2,p.b3p1,p.b3p2,p.b4p1,p.b4p2].some(function(pl){return pl.toLowerCase().indexOf(ql)!==-1;});});
  document.getElementById('count-badge').textContent=filtered.length+' / '+allP.length+' participants';
  var grid=document.getElementById('participants-grid');
  if(!filtered.length){grid.innerHTML='<div class="msg">No participants found.</div>';return;}
  function tag(cls,name){return name?'<span class="pick-tag pick-'+cls+'">'+name+'</span>':'';}
  grid.innerHTML=filtered.map(function(p,i){
    return'<div class="p-card">'
      +'<div class="p-name"><span>'+p.name+'</span><span class="p-num">#'+(i+1)+'</span></div>'
      +'<div class="bracket-section"><div class="b-label">Bracket 1 (Top 25)</div><div class="b-players">'+tag('b1',p.b1p1)+tag('b1',p.b1p2)+((!p.b1p1&&!p.b1p2)?'<span class="no-picks">No pick yet</span>':'')+'</div></div>'
      +'<div class="bracket-section"><div class="b-label">Bracket 2 (26&ndash;50)</div><div class="b-players">'+tag('b2',p.b2p1)+tag('b2',p.b2p2)+((!p.b2p1&&!p.b2p2)?'<span class="no-picks">No pick yet</span>':'')+'</div></div>'
      +'<div class="bracket-section"><div class="b-label">Bracket 3 (51&ndash;75)</div><div class="b-players">'+tag('b3',p.b3p1)+tag('b3',p.b3p2)+((!p.b3p1&&!p.b3p2)?'<span class="no-picks">No pick yet</span>':'')+'</div></div>'
      +'<div class="bracket-section"><div class="b-label">Bracket 4 (76&ndash;100)</div><div class="b-players">'+tag('b4',p.b4p1)+tag('b4',p.b4p2)+((!p.b4p1&&!p.b4p2)?'<span class="no-picks">No pick yet</span>':'')+'</div></div>'
      +'</div>';
  }).join('');
}
document.getElementById('search-part').addEventListener('input',function(e){renderGrid(e.target.value);});
loadParticipants();
setInterval(loadParticipants,300000);
</script>
</body>
</html>
