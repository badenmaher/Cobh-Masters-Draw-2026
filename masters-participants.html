<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masters 2026 Participants</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body{
      margin:0;
      font-family:'Inter',sans-serif;
      background:#082a1a;
      color:#f5eed4;
    }
    .wrap{
      width:min(100% - 32px,1100px);
      margin:0 auto;
      padding:28px 0 40px;
    }
    h1{
      margin:0 0 6px;
      font-family:'Cormorant Garamond',serif;
      color:#f2d57b;
      font-size:clamp(2rem,4vw,3rem);
    }
    .sub{
      color:#d6c9a0;
      margin-bottom:22px;
    }
    .search{
      width:100%;
      padding:14px 16px;
      border-radius:14px;
      border:1px solid rgba(220,180,74,.25);
      background:#103922;
      color:#fff;
      margin-bottom:20px;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:18px;
    }
    .card{
      background:#123f29;
      border:1px solid rgba(220,180,74,.2);
      border-radius:18px;
      padding:18px;
    }
    .name{
      font-weight:800;
      color:#f2d57b;
      margin-bottom:12px;
    }
    .row{
      background:rgba(255,255,255,.03);
      border-radius:12px;
      padding:10px 12px;
      margin-bottom:10px;
    }
    .label{
      font-size:.76rem;
      color:#afbaa6;
      text-transform:uppercase;
      letter-spacing:.08em;
      margin-bottom:8px;
    }
    .picks{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }
    .pick{
      display:inline-flex;
      padding:7px 10px;
      border-radius:999px;
      font-size:.88rem;
      font-weight:700;
      color:#fff;
    }
    .b1{background:#1e6c42}
    .b2{background:#2d7e4b}
    .b3{background:#8b6a2c}
    .b4{background:#6d4d22}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Masters 2026 Participants</h1>
    <div class="sub">Live entries list from the participants sheet</div>
    <input id="search" class="search" placeholder="Search participant or golfer">
    <div id="grid" class="grid"></div>
  </div>

  <script>
    const PARTICIPANTS_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTcK-7L1HPPhCjzjORjaxQ9DUEznolHMbCkG1e-cEXZ2v2xx_qw7DygtkfdNjO9GiSsyd5KaQaS8RU9/pub?gid=1462564797&single=true&output=csv';

    let entries = [];
    let term = '';

    function splitCSVLine(line) {
      const result = [];
      let current = '';
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const next = line[i + 1];
        if (char === '"' && inQuotes && next === '"') { current += '"'; i++; }
        else if (char === '"') inQuotes = !inQuotes;
        else if (char === ',' && !inQuotes) { result.push(current); current = ''; }
        else current += char;
      }
      result.push(current);
      return result.map(v => v.trim());
    }

    function parseCSV(csv) {
      const lines = csv.trim().split(/\r?\n/);
      const headers = splitCSVLine(lines[0]);
      return lines.slice(1).map(line => {
        const values = splitCSVLine(line);
        const row = {};
        headers.forEach((h, i) => row[h] = values[i] ?? '');
        return row;
      });
    }

    function render() {
      const grid = document.getElementById('grid');
      const filtered = entries.filter(e => {
        if (!term) return true;
        return e.name.toLowerCase().includes(term) || e.picks.some(p => p.toLowerCase().includes(term));
      });

      const labels = ['Bracket 1','Bracket 2','Bracket 3','Bracket 4'];
      const classes = ['b1','b2','b3','b4'];

      grid.innerHTML = filtered.map((entry, idx) => `
        <div class="card">
          <div class="name">${idx + 1}. ${entry.name}</div>
          ${[0,1,2,3].map(bi => {
            const p1 = entry.picks[bi * 2] || '';
            const p2 = entry.picks[bi * 2 + 1] || '';
            if (!p1 && !p2) return '';
            return `
              <div class="row">
                <div class="label">${labels[bi]}</div>
                <div class="picks">
                  ${p1 ? `<span class="pick ${classes[bi]}">${p1}</span>` : ''}
                  ${p2 ? `<span class="pick ${classes[bi]}">${p2}</span>` : ''}
                </div>
              </div>
            `;
          }).join('')}
        </div>
      `).join('');
    }

    async function init() {
      const csv = await fetch(PARTICIPANTS_CSV + '&t=' + Date.now()).then(r => r.text());
      const rows = parseCSV(csv);
      entries = rows.map(r => ({
        name: r.Name || '',
        picks: [r.B1Pick1||'', r.B1Pick2||'', r.B2Pick1||'', r.B2Pick2||'', r.B3Pick1||'', r.B3Pick2||'', r.B4Pick1||'', r.B4Pick2||'']
      })).filter(r => r.name);
      render();
    }

    document.getElementById('search').addEventListener('input', e => {
      term = (e.target.value || '').toLowerCase().trim();
      render();
    });

    init();
  </script>
</body>
</html>
